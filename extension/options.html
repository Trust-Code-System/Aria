<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Aria extension settings</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 16px;
        min-width: 320px;
        color: #1a1625;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e6e1ef;
        border-radius: 10px;
        font-size: 13px;
      }
      button {
        margin-top: 12px;
        border: 0;
        border-radius: 999px;
        background: #6d5cff;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 8px 14px;
        cursor: pointer;
      }
      p {
        font-size: 12px;
        color: #6b6578;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #16a34a;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <label for="appUrl">Aria app URL</label>
    <input id="appUrl" type="url" placeholder="https://aria-vert-chi.vercel.app" />
    <p>Use your production URL, or <code>http://localhost:3000</code> while developing.</p>
    <button type="button" id="save">Save</button>
    <div id="status"></div>
    <script src="options.js" type="module"></script>
  </body>
</html>
